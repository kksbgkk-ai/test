<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}취합 자동화 시스템{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --warning: #d97706;
        }
        body { background: #f8fafc; font-family: 'Malgun Gothic', sans-serif; }
        .navbar { background: var(--primary) !important; }
        .navbar-brand { font-weight: 700; font-size: 1.25rem; color: #fff !important; }
        .navbar .nav-link { color: rgba(255,255,255,.85) !important; }
        .navbar .nav-link:hover { color: #fff !important; }
        .sidebar { min-height: calc(100vh - 56px); background: #fff; border-right: 1px solid #e2e8f0; }
        .card { border: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); border-radius: 10px; }
        .card-header { background: #fff; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); }
        .badge-collecting { background: #dbeafe; color: #1d4ed8; }
        .badge-closed { background: #f1f5f9; color: #64748b; }
        .stat-card { border-radius: 12px; padding: 1.5rem; color: #fff; }
        .stat-card.blue { background: linear-gradient(135deg, #2563eb, #3b82f6); }
        .stat-card.green { background: linear-gradient(135deg, #16a34a, #22c55e); }
        .stat-card.red { background: linear-gradient(135deg, #dc2626, #ef4444); }
        .stat-card.orange { background: linear-gradient(135deg, #d97706, #f59e0b); }
        .stat-card .number { font-size: 2.5rem; font-weight: 700; }
        .stat-card .label { font-size: .85rem; opacity: .85; }
        .table th { background: #f8fafc; font-weight: 600; font-size: .875rem; }
        .table td { vertical-align: middle; font-size: .875rem; }
        .error-row { background: #fff5f5 !important; }
        .active-badge { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .page-header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 1rem 1.5rem; margin-bottom: 1.5rem; }
        .page-header h4 { margin: 0; font-weight: 700; color: #1e293b; }
        .filter-tabs .nav-link { color: #64748b; border-radius: 8px; padding: .4rem 1rem; }
        .filter-tabs .nav-link.active { background: var(--primary); color: #fff; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="bi bi-collection me-2"></i>취합 자동화 시스템</a>
        <div class="navbar-nav ms-auto">
            <span class="nav-link">
                <i class="bi bi-circle-fill text-success me-1" style="font-size:.6rem"></i>
                감시 폴더: C:/취합데이터
            </span>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        {% block content %}{% endblock %}
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
